<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CardioGuard AI - 3D Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* Glass 3D Card */
.container {
    width: 900px;
    padding: 30px;
    border-radius: 25px;
    background: rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(20px);
    box-shadow: 
        0 10px 30px rgba(0,0,0,0.4),
        inset 0 0 10px rgba(255,255,255,0.1);
    transform: perspective(1000px) rotateX(2deg);
    transition: 0.3s;
}

.container:hover {
    transform: perspective(1000px) rotateX(0deg) scale(1.02);
}

/* Title */
h2 {
    text-align: center;
    color: #fff;
    margin-bottom: 20px;
    text-shadow: 0 0 10px #00c6ff;
}

/* Inputs */
.input-group {
    margin-bottom: 15px;
}

input, select {
    width: 100%;
    padding: 12px;
    border-radius: 12px;
    border: none;
    outline: none;
    background: rgba(255,255,255,0.15);
    color: white;
    box-shadow: inset 0 0 8px rgba(0,0,0,0.4);
    transition: 0.3s;
}

input:focus, select:focus {
    box-shadow: 0 0 10px #00c6ff;
}

/* Button */
button {
    width: 100%;
    padding: 14px;
    border-radius: 15px;
    border: none;
    background: linear-gradient(135deg, #00c6ff, #0072ff);
    color: white;
    font-weight: 600;
    cursor: pointer;
    transition: 0.3s;
    box-shadow: 0 5px 20px rgba(0,198,255,0.4);
}

button:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 25px rgba(0,198,255,0.7);
}

/* Result Card */
.result {
    margin-top: 20px;
    padding: 20px;
    border-radius: 15px;
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
    box-shadow: inset 0 0 10px rgba(255,255,255,0.1);
    text-align: center;
    color: white;
}

/* Risk Colors */
.low { color: #00ff9f; text-shadow: 0 0 10px #00ff9f; }
.moderate { color: #ffc107; text-shadow: 0 0 10px #ffc107; }
.high { color: #ff4b2b; text-shadow: 0 0 10px #ff4b2b; }

</style>

</head>

<body>

<div class="container">

<h2>❤️ CardioGuard AI</h2>

<div id="predict">

    <div class="input-group">
        <input type="number" id="age" placeholder="Age">
    </div>

    <div class="input-group">
        <select id="gender">
            <option>Male</option>
            <option>Female</option>
        </select>
    </div>

    <div class="input-group">
        <input type="number" id="sysBP" placeholder="Systolic BP">
    </div>

    <div class="input-group">
        <input type="number" id="totChol" placeholder="Cholesterol">
    </div>

    <div class="input-group">
        <input type="number" id="glucose" placeholder="Glucose">
    </div>

    <div class="input-group">
        <select id="smoking">
            <option>No</option>
            <option>Yes</option>
        </select>
    </div>

    <div class="input-group">
        <input type="number" id="bmi" placeholder="BMI">
    </div>

    <button onclick="predict()">🚀 Predict Risk</button>

    <div id="result" class="result"></div>

</div>

</div>

<script>

function predict() {

    const age = document.getElementById("age").value;
    const sysBP = document.getElementById("sysBP").value;
    const totChol = document.getElementById("totChol").value;
    const glucose = document.getElementById("glucose").value;
    const bmi = document.getElementById("bmi").value;

    if (!age || !sysBP || !totChol || !glucose || !bmi) {
        alert("⚠️ Please fill all fields");
        return;
    }

    const data = {
        age: parseFloat(age),
        gender: document.getElementById("gender").value,
        sysBP: parseFloat(sysBP),
        totChol: parseFloat(totChol),
        glucose: parseFloat(glucose),
        smoking: document.getElementById("smoking").value,
        bmi: parseFloat(bmi)
    };

    const resultDiv = document.getElementById("result");
    resultDiv.innerHTML = "⏳ Predicting...";

    fetch("http://127.0.0.1:5000/api/predict", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify(data)
    })
    .then(res => res.json())
    .then(res => {

        let color = res.category === "HIGH" ? "high" :
                    res.category === "MODERATE" ? "moderate" : "low";

        resultDiv.innerHTML = `
            <h2 class="${color}">${res.emoji} ${res.category}</h2>
            <p><b>Risk:</b> ${res.risk_probability}%</p>
            <p>${res.advice}</p>
        `;
    })
    .catch(() => {
        resultDiv.innerHTML = "❌ Server Error. Make sure backend is running.";
    });
}

</script>

</body>
</html>
